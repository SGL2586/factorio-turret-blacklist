[mod-name]
turret-blacklist=Turret Blacklist

[mod-description]
turret-blacklist=Adds an 'Invert Targets' button to turret GUIs to flip the target priority list, making turrets target everything EXCEPT what is listed.

[mod-setting-name]
turret-blacklist-additional-types=Additional Entity Types

[mod-setting-description]
turret-blacklist-additional-types=Comma-separated list of additional entity prototype types to include in the inversion (for modded enemies). Example: giant-biter,modded-turret

[turret-blacklist]
gui-title=Turret Blacklist
invert-targets=Invert Targets
no-inversion-possible=Cannot invert: no enemy entities available to target.
